appId: com.copydash.app
productName: CopyDash
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
  - resources/**/*
  - "!node_modules/**/*.map"
  - "!node_modules/**/*.md"
  - "!node_modules/**/LICENSE*"
  - "!node_modules/**/changelog*"
win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.ico
  signAndEditExecutable: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

publish:
  provider: github
  owner: hanyiwei
  repo: CopyDash
