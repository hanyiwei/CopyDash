appId: com.copydash.app
productName: CopyDash
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
  - resources/**/*
win:
  target:
    - target: zip
      arch: [x64]
  icon: resources/icon.png
  signAndEditExecutable: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
